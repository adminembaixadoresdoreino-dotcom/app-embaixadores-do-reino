version: '3.8'

services:

  postgres:

    image: postgres:15
    container_name: embaixadores_postgres

    environment:
      POSTGRES_DB: embaixadores
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: